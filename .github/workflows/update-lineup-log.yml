name: Update lineup HR log

# Recurring schedule: grades yesterday against real box scores (eval log +
# model retuning), then copies those REAL graded hitter-days into
# data/lineup_hr_log.csv and commits both, so the record accumulates over
# time. The lineup log is sourced from the eval record only — it can never
# contain simulated rows.

on:
  schedule:
    - cron: "0 12 * * *"   # daily at 12:00 UTC (after the prior day's games settle)
  workflow_dispatch:        # allow manual runs
    inputs:
      date:
        description: "End date (YYYY-MM-DD), defaults to today (UTC)"
        required: false
      lookback:
        description: "Days to look back"
        required: false
        default: "3"

permissions:
  contents: write

concurrency:
  group: lineup-log
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Daily self-improvement (grade yesterday + retune)
        run: python scripts/daily_improve.py || echo "daily improve skipped"

      - name: Update the lineup HR log (from the real graded record)
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          LOOKBACK="${{ github.event.inputs.lookback || '3' }}"
          if [ -z "$DATE" ]; then DATE="$(date -u +%F)"; fi
          python scripts/update_lineup_log.py "$DATE" "$LOOKBACK"

      - name: Commit & push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lineup_hr_log.csv data/eval_log.csv data/model_tuning.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily data + model tuning update [skip ci]"
            git push
          fi
